apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: app-deployment-multiple
  title: App Deployment (Multiple Values)
  description: Deploy an app to a cluster with multiple value sources.
spec:
  owner: group:team-honeybadger
  type: resource
  parameters:
    - title: Configuration
      description: Add ConfigMap or Secret value sources. Order determines merge priority (last wins).
      ui:ObjectFieldTemplate: GSStepLayout
      ui:options:
        configurationDocs:
          chartRef: gsoci.azurecr.io/charts/giantswarm/hello-world
          chartTag: 3.0.2
      properties:
        valueSources:
          title: Value sources
          type: array
          minItems: 0
          default:
            - kind: ConfigMap
              name: user-values
              valuesKey: values
              values: ''
            - kind: Secret
              name: user-secrets
              valuesKey: values
              values: ''
          items:
            type: object
            required:
              - kind
              - name
            properties:
              kind:
                title: Kind
                type: string
                enum:
                  - ConfigMap
                  - Secret
                default: ConfigMap
              name:
                title: Name suffix
                type: string
                description: Appended to the deployment name.
              valuesKey:
                title: Data key
                type: string
                default: values
            dependencies:
              kind:
                allOf:
                  - if:
                      properties:
                        kind:
                          const: ConfigMap
                      required:
                        - kind
                    then:
                      properties:
                        values:
                          title: Values (YAML)
                          type: string
                          ui:field: GSYamlValuesEditor
                          ui:options:
                            chartRef: gsoci.azurecr.io/charts/giantswarm/hello-world
                            chartTag: 3.0.2
                  - if:
                      properties:
                        kind:
                          const: Secret
                      required:
                        - kind
                    then:
                      properties:
                        values:
                          title: Values (YAML, stored securely)
                          type: string
                          ui:field: GSSecretYamlValuesEditor
                          ui:options:
                            secretsKey: SECRET_VALUES_MAP
                            chartRef: gsoci.azurecr.io/charts/giantswarm/hello-world
                            chartTag: 3.0.2
  steps:
    - id: fetchTemplate
      name: Template manifests
      action: fetch:template
      input:
        url: ./template
        values:
          name: test-name
          namespace: test-namesapce
          clusterName: test-cluster
          isManagementCluster: true
          targetNamespace: test-namespace
          chartRef: gsoci.azurecr.io/charts/giantswarm/hello-world
          chartTag: 3.0.2
          automaticUpgrades: patch
          valueSources: ${{ parameters.valueSources }}
          secretValuesMap: ${{ secrets.SECRET_VALUES_MAP }}
    - id: cleanup
      name: Clean up
      action: roadiehq:utils:fs:replace
      input:
        files:
          - file: manifest.yaml
            find: \n\s*\n
            replaceWith: "\n"
            matchRegex: true
    - id: parseFile
      name: Print manifests
      action: roadiehq:utils:fs:parse
      input:
        path: manifest.yaml
  output:
    text:
      - title: Manifests
        content: |
          ```yaml
          ${{ steps.parseFile.output.content }}
          ```
