apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: app-deployment-custom
  title: App Deployment (Custom Editor)
  description: Deploy an app to a cluster with multiple value sources using a custom editor.
spec:
  owner: group:team-honeybadger
  type: resource
  parameters:
    - title: Configuration
      description: Here you can edit the application's configuration.
      ui:ObjectFieldTemplate: GSStepLayout
      ui:options:
        configurationDocs:
          chartRef: gsoci.azurecr.io/charts/giantswarm/hello-world
          chartTag: 3.0.2
      properties:
        valuesMode:
          title: Configuration mode
          type: string
          enum:
            - valuesFrom
            - inline
          default: valuesFrom
          ui:enumNames:
            - Value source references (ConfigMap/Secret)
            - Inline values
          ui:widget: radio
      dependencies:
        valuesMode:
          allOf:
            - if:
                properties:
                  valuesMode:
                    const: valuesFrom
                required:
                  - valuesMode
              then:
                properties:
                  valueSources:
                    title: Value sources
                    description: Add ConfigMap or Secret value sources. Order determines merge priority (last wins).
                    type: array
                    ui:field: GSValueSourcesEditor
                    ui:options:
                      secretsKey: SECRET_VALUES_MAP
                      chartRef: gsoci.azurecr.io/charts/giantswarm/hello-world
                      chartTag: 3.0.2
                      initialNamePrefixTemplate: test-name
            - if:
                properties:
                  valuesMode:
                    const: inline
                required:
                  - valuesMode
              then:
                properties:
                  values:
                    title: Values
                    type: string
                    ui:field: GSYamlValuesEditor
                    ui:options:
                      chartRef: gsoci.azurecr.io/charts/giantswarm/hello-world
                      chartTag: 3.0.2
                      height: 300
                  schemaValidation:
                    type: boolean
                    ui:field: GSYamlValuesValidation
                    ui:options:
                      chartRef: gsoci.azurecr.io/charts/giantswarm/hello-world
                      chartTag: 3.0.2
                      valuesFields:
                        - values
  steps:
    - id: fetchTemplate
      name: Template manifests
      action: fetch:template
      input:
        url: ./template
        values:
          name: test-name
          namespace: test-namespace
          clusterName: test-cluster
          isManagementCluster: true
          targetNamespace: test-namespace
          chartRef: gsoci.azurecr.io/charts/giantswarm/hello-world
          chartTag: 3.0.2
          automaticUpgrades: patch
          valuesMode: ${{ parameters.valuesMode }}
          valueSources: ${{ parameters.valueSources }}
          secretValuesMap: ${{ secrets.SECRET_VALUES_MAP }}
          inlineValues: ${{ parameters.values }}
    - id: cleanup
      name: Clean up
      action: roadiehq:utils:fs:replace
      input:
        files:
          - file: manifest.yaml
            find: \n\s*\n
            replaceWith: "\n"
            matchRegex: true
    - id: parseFile
      name: Print manifests
      action: roadiehq:utils:fs:parse
      input:
        path: manifest.yaml
  output:
    text:
      - title: Manifests
        content: |
          ```yaml
          ${{ steps.parseFile.output.content }}
          ```
