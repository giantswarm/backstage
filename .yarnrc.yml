checksumBehavior: update

# Exempt our own packages (published by giantswarm CI) from Yarn's minimum
# release age quarantine (npmMinimalAgeGate, 24h by default) -- fresh releases
# of first-party packages are exactly what we want to consume immediately.
npmPreapprovedPackages:
  - '@giantswarm-io/*'

# Allowlist the Giant Swarm git dependencies Yarn 4 is allowed to fetch.
# Yarn 4 blocks resolving git deps unless the repo is approved here.
approvedGitRepositories:
  - 'https://github.com/giantswarm/*'

# Yarn 4.14 changed the default of enableScripts to false, which prevents
# native modules (e.g. better-sqlite3) from building their bindings.
# Restore the pre-4.14 behavior for this existing project.
enableScripts: true

# Keep the dependency cache project-local (.yarn/cache) instead of the Yarn 4
# default global folder. The generated CircleCI node-build job caches and
# restores .yarn/cache keyed on yarn.lock; with the global cache the project dir
# is empty and the cache is a no-op. .yarn/cache is gitignored (no zero-install).
enableGlobalCache: false

nodeLinker: node-modules

# @assistant-ui/core declares zustand only as a peerDependency (^5). With
# @stoplight/mosaic pulling in zustand@3 (a different, incompatible major), the
# hoisted @assistant-ui/core binds to the top-level v3 — whose default-only
# export lacks the named `create` v5 provides, breaking the build
# (ESModulesLinkingError: export 'create' not found in 'zustand'). Promote
# zustand to a real dependency of @assistant-ui/core so every instance resolves
# the v5 it needs; mosaic keeps its own v3.
packageExtensions:
  '@assistant-ui/core@*':
    dependencies:
      zustand: ^5.0.14

plugins:
  - checksum: ae08ece83681cc6d217ebb53d9e00a06ea215383f34af0681a05da5720e018a6b0d98012112f9368e9fe2328b19919baba37ada25f46c4614b894765a9338db9
    path: .yarn/plugins/@yarnpkg/plugin-backstage.cjs
    spec: 'https://versions.backstage.io/v1/releases/1.53.0/yarn-plugin'

yarnPath: .yarn/releases/yarn-4.17.1.cjs
