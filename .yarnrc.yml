checksumBehavior: update

# Yarn 4.14 changed the default of enableScripts to false, which prevents
# native modules (e.g. better-sqlite3) from building their bindings.
# Restore the pre-4.14 behavior for this existing project.
enableScripts: true

# Keep the dependency cache project-local (.yarn/cache) instead of the Yarn 4
# default global folder. The generated CircleCI node-build job caches and
# restores .yarn/cache keyed on yarn.lock; with the global cache the project dir
# is empty and the cache is a no-op. .yarn/cache is gitignored (no zero-install).
enableGlobalCache: false

nodeLinker: node-modules

plugins:
  - checksum: 0cfdc882d3c1395592aa6d4690958e70ebbc3a8ee1d888d523dc9e3c74796de26f744c37df66a69212280634f422a88074ba625dce0f7886fbdf2a904a0c38a2
    path: .yarn/plugins/@yarnpkg/plugin-backstage.cjs
    spec: 'https://versions.backstage.io/v1/releases/1.52.0/yarn-plugin'

yarnPath: .yarn/releases/yarn-4.17.0.cjs
