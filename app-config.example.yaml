# Example app-config for the broker-only cluster-access model.
#
# Copy the blocks you need into your `app-config.local.yaml`. Cluster access
# for every management cluster is handled by the muster cluster-token broker:
# the user logs in once through the main Dex provider, and per-cluster
# Kubernetes tokens are minted silently from that single session. There are no
# per-cluster OIDC login popups and no `auth.providers.oidc-<mc>` blocks beyond
# the one main login.
#
# The legacy per-cluster "headless" Backstage backend (one backend per cluster,
# each with its own `oidc-<mc>` provider) has been retired in favour of this
# model -- see `packages/backend-headless-service/README.md`.

app:
  baseUrl: http://localhost:3000

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true

auth:
  environment: development
  session:
    secret: ${AUTH_SESSION_SECRET}
  providers:
    # The single main login. Every cluster is reached through the broker using
    # this Dex session as the RFC 8693 subject token, so this is the ONLY
    # oidc-<mc> provider you need -- there are no per-cluster providers.
    oidc-main:
      development:
        metadataUrl: ${MAIN_OIDC_METADATA_URL}
        clientId: ${MAIN_OIDC_CLIENT_ID}
        clientSecret: ${MAIN_OIDC_CLIENT_SECRET}

kubernetes:
  serviceLocatorMethod:
    type: 'multiTenant'
  clusterLocatorMethods:
    - type: 'config'
      clusters:
        # The main installation, whose Dex session is the broker subject token.
        - name: main
          url: ${MAIN_API_ENDPOINT}
          authProvider: oidc
          oidcTokenProvider: oidc-main
        # Any other installation is broker-covered: `oidcTokenProvider` stays as
        # the k8s-plugin routing key, but it needs no `auth.providers` entry.
        - name: example
          url: ${EXAMPLE_API_ENDPOINT}
          authProvider: oidc
          oidcTokenProvider: oidc-example

gs:
  # Name of the main login provider above. Its session is exchanged for
  # per-cluster tokens by the broker.
  authProvider: oidc-main

  # Muster cluster-token broker. Setting `tokenUrl` enables the silent
  # per-cluster token path; without it Backstage falls back to per-cluster
  # OIDC popups. `clientId`/`clientSecret` are the confidential client
  # registered with the broker (backend-only / secret).
  clusterTokenBroker:
    tokenUrl: ${CLUSTER_TOKEN_BROKER_URL} # e.g. https://muster.example.gigantic.io/oauth/token
    clientId: ${CLUSTER_TOKEN_BROKER_CLIENT_ID}
    clientSecret: ${CLUSTER_TOKEN_BROKER_CLIENT_SECRET}

  # Optional: bound each Kubernetes proxy request so one unreachable cluster
  # cannot freeze the clusters list (default 10000ms), and cap how many proxy
  # requests (including broker token mints) run at once so connecting to every
  # installation on startup does not storm the broker/apiservers (default 6).
  kubernetes:
    proxyTimeoutMs: 10000
    proxyMaxConcurrency: 6

  installations:
    main:
      authProvider: oidc
      oidcTokenProvider: oidc-main
      pipeline: stable
      providers:
        - capa
    example:
      authProvider: oidc
      oidcTokenProvider: oidc-example
      # Marks this installation as fully broker-covered: its token is minted
      # silently from the main session, and it gets no entry on the provider
      # settings page.
      clusterTokenAudience: example
      pipeline: stable
      providers:
        - capa

# Muster management UI (plugins/muster frontend + plugins/muster-backend).
#
# CRD-backed views -- the dashboard, MCP-server manager, workflow definitions,
# and the fleet health matrix -- read MCPServer/Workflow CRs
# (muster.giantswarm.io/v1alpha1) through the Kubernetes proxy using the
# `kubernetes` clusters configured above. The CRs are discovered live per
# cluster, so no `kubernetes.customResources` registration is needed. The
# InstallationPicker derives its list from those same clusters, so every MC
# that runs a muster aggregator appears automatically -- nothing is hardcoded.
#
# `muster.installations` configures the MCP proxy (muster-backend) used for
# live tool execution, workflow runs, and aggregator/auth state. List one
# entry per muster aggregator -- a single muster federates many management
# clusters. The endpoint is the per-MC muster URL
# `https://muster.<mc>.<domain>/mcp`; the domain differs per installation and
# cannot be derived from the name, so it is given here. Keep the
# deployment-specific fleet out of source control via env-var substitution
# (real per-MC endpoints live in each cluster's deployed config). Each entry's
# `name` must match the Kubernetes cluster name above so the CRD picker and
# the MCP proxy line up. Routes select the active installation via
# `?installation=<name>`.
muster:
  installations:
    - name: main
      url: ${MUSTER_MAIN_URL} # e.g. https://muster.<mc>.<domain>/mcp
      # Forward the logged-in user's token (the same Dex session used for
      # cluster access; falls back to the main id token when no dedicated
      # OAuth provider is registered for this name). Requests without a token
      # are rejected with 401.
      authProvider: oidc-main
      # Read-only safety gate (the default). `call_tool` invocations whose
      # tool name looks mutating -- apply/create/update/delete/patch/scale/
      # restart/start/stop/exec/write/remove/set -- and workflow runs are
      # blocked with 403 unless this is true. Leave unset for GitOps-managed
      # installations; opt a single installation in only when you mean it.
      # allowMutations: false
    - name: example
      url: ${MUSTER_EXAMPLE_URL}
      authProvider: oidc-example
