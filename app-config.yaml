app:
  title: Dev Portal
  baseUrl: http://localhost:3000
  extensions:
    - api:home/visits
    - app-root-element:home/visit-listener
    - page:gs/clusters
    - nav-item:gs/clusters
    - page:gs/deployments
    - nav-item:gs/deployments
    - page:gs/installations
    - nav-item:gs/installations
    - page:flux
    - nav-item:flux
    - page:ai-chat
    - api:ai-chat/service
    - api:ai-chat/drawer
    - app-root-element:ai-chat/drawer

    # PagerDuty plugin is disabled — only the api:pagerduty extension is left
    # registered (via pagerDutyPlugin in App.tsx) so our custom WhoIsOnCallEntityCard
    # can still use pagerDutyApiRef.
    - entity-card:pagerduty/EntityPagerDutyCard: false
    - entity-card:pagerduty/EntityPagerDutySmallCard: false
    - nav-item:pagerduty/PagerDutyNavBarItem: false
    - page:pagerduty: false

    # Entity overview card order: app-deployment, then who-is-on-call, then about.
    - entity-card:gs/app-deployment
    - entity-card:catalog/who-is-on-call
    - entity-card:catalog/about

    - entity-card:catalog/depends-on-components: false
    - entity-card:catalog/depends-on-resources: false
    - entity-card:catalog/has-subcomponents: false
    - entity-card:catalog/labels: false
    - entity-card:catalog-graph/relations: false
    - entity-card:api-docs/provided-apis: false
    - entity-card:api-docs/consumed-apis: false
    - entity-card:api-docs/consuming-components: false
    - entity-card:api-docs/providing-components: false
    - entity-card:github-actions/recent-workflow-runs: false

    - entity-content:techdocs: false
    - entity-content:kubernetes/kubernetes: false
    - entity-content:api-docs/definition: false
    - entity-content:api-docs/apis: false

    - entity-context-menu-item:catalog/unregister-entity: false

    - page:scaffolder:
        config:
          title: Create things
    - sub-page:scaffolder/actions: false
    - sub-page:scaffolder/editor: false
    - sub-page:scaffolder/templating-extensions: false
  routes:
    bindings:
      catalog.createComponent: scaffolder.root
      catalog.viewTechDoc: techdocs.docRoot
      org.catalogIndex: catalog.catalogIndex
      gs.fluxOverview: flux.overview
      gs.fluxResources: flux.root
  telemetrydeck:
    appID: ''
    salt: ${TELEMETRYDECK_SALT}
search:
  defaultType: software-catalog

organization:
  name: My Company

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
    # Uncomment the following host directive to bind to specific interfaces
    # host: 127.0.0.1
  csp:
    connect-src: ["'self'", 'http:', 'https:']
    img-src:
      - "'self'"
      - 'data:'
      - 'https://avatars.githubusercontent.com'
      - 'https://circleci.com'
      - 'https://codecov.io'
      - 'https://dl.circleci.com'
      - 'https://github.com'
      - 'https://godoc.org'
      - 'https://goreportcard.com'
      - 'https://img.shields.io'
      - 'https://pkg.go.dev'
      - 'https://user-images.githubusercontent.com'
    script-src:
      - "'self'"
      - "'unsafe-eval'"
    worker-src:
      - "'self'"
      - "'unsafe-eval'"
      - 'blob:'
    # Content-Security-Policy directives follow the Helmet format: https://helmetjs.github.io/#reference
    # Default Helmet Content-Security-Policy values can be removed by setting the key to false
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: better-sqlite3
    connection: ':memory:'
    # client: pg
    # pluginDivisionMode: schema
    # connection:
    #   host: '127.0.0.1'
    #   port: '5432'
    #   user: ${POSTGRES_USER}
    #   password: ${POSTGRES_PASSWORD}

  # see https://backstage.io/docs/ai/mcp-actions#actions-configuration for more details
  actions:
    pluginSources:
      - auth
      - catalog
      - gs
    # Optional: filter which actions are available to the model. By default, all actions from the listed pluginSources are included.
    # filter:
    #   exclude:
    #     - id: 'gs:get-pagerduty-ids-for-entity'

  cache:
    store: memory
  # workingDirectory: /tmp # Use this to configure a working directory for the scaffolder, defaults to the OS temp-dir

integrations:
  # Example for how to add GitHub integration with a GitHub App.
  # github:
  #   - host: github.com
  #     apps:
  #       - $include: github-app-credentials.yaml

permission:
  enabled: true

# see https://backstage.io/docs/ai/mcp-actions for more details
mcpActions:
  name: 'My Company Backstage' # defaults to "backstage"
  description: 'Tools for managing your software catalog, creating new services from templates, and exploring your developer portal' # optional
  namespacedToolNames: false

proxy:
  ### Example for how to add a proxy endpoint for the frontend.
  ### A typical reason to do this is to handle HTTPS and CORS for internal services.
  # endpoints:
  #   '/test':
  #     target: 'https://example.com'
  #     changeOrigin: true

# Reference documentation http://backstage.io/docs/features/techdocs/configuration
# Note: After experimenting with basic setup, use CI/CD to generate docs
# and an external cloud storage when deploying TechDocs for production use-case.
# https://backstage.io/docs/features/techdocs/how-to-guides#how-to-migrate-from-techdocs-basic-to-recommended-deployment-approach
techdocs:
  builder: 'local' # Alternatives - 'external'
  generator:
    runIn: 'docker' # Alternatives: 'local'
  publisher:
    type: 'local' # Alternatives: 'googleGcs', 'awsS3'

kubernetes:
  serviceLocatorMethod:
    type: 'multiTenant'
  clusterLocatorMethods:
    - type: 'config'
      clusters: []

auth:
  # see https://backstage.io/docs/auth/ to learn about auth providers
  environment: development
  # GitHub OAuth example
  # providers:
  #   github:
  #     development:
  #       clientId: ${GITHUB_OAUTH_CLIENT_ID}
  #       clientSecret: ${GITHUB_OAUTH_CLIENT_SECRET}
  providers: {}

  # see https://backstage.io/docs/ai/mcp-actions#client-id-metadata-documents
  # to learn more about client id metadata documents
  experimentalClientIdMetadataDocuments:
    enabled: false
    # Optional: restrict which `client_id` URLs are allowed (defaults to ['*'])
    # allowedClientIdPatterns:
    #   - 'https://example.com/*'
    #   - 'https://*.trusted-domain.com/*'
    # Optional: restrict which redirect URIs are allowed (defaults to ['*'])
    # allowedRedirectUriPatterns:
    #   - 'http://localhost:*'
    #   - 'https://*.example.com/*'

scaffolder:
  # see https://backstage.io/docs/features/software-templates/configuration for software template options

catalog:
  rules:
    - allow:
        - API
        - Component
        - Domain
        - Group
        - Location
        - Resource
        - System
        - User
        - Template
