grafana:
  domain: https://example.com

# PagerDuty plugin configuration
# https://pagerduty.github.io/backstage-plugin-docs/
pagerDuty:
  # REST API token (read-only is sufficient for the entity card).
  apiToken: ${PAGERDUTY_TOKEN}
  # Giant Swarm uses the EU region (app.eu.pagerduty.com).
  apiBaseUrl: https://api.eu.pagerduty.com

# AI Chat plugin configuration
aiChat:
  # Anthropic configuration
  anthropic:
    apiKey: ${ANTHROPIC_API_KEY}
    # Optional: custom base URL for Anthropic-compatible APIs
    # baseUrl: https://api.anthropic.com/v1

  # OpenAI configuration
  openai:
    apiKey: ${OPENAI_API_KEY}
    # Optional: custom base URL for OpenAI-compatible APIs
    # baseUrl: https://api.openai.com/v1

  # Azure OpenAI configuration (when configured, used instead of direct OpenAI)
  # azure:
  #   apiKey: ${AZURE_OPENAI_API_KEY}
  #   resourceName: my-resource  # constructs https://my-resource.openai.azure.com/openai
  #   # baseUrl: https://my-resource.openai.azure.com/openai  # alternative: full URL
  #   # apiVersion: '2024-10-21'  # optional API version override

  # Model to use (default: gpt-4o-mini)
  model: gpt-4o-mini

  # Expert-knowledge skills exposed to the model via `listSkills` /
  # `getSkill` tools. The plugin ships a default set of bundled skills;
  # deployments can opt out and/or extend them with extra sources.
  # Merge order (later wins on name collision): bundled -> dir -> inline.
  # skills:
  #   # Set to false to opt out of the bundled skills.
  #   bundled: true
  #   # Optional directory of *.md files (e.g. mounted from a Kubernetes
  #   # ConfigMap). Each file becomes a skill named after its basename.
  #   dir: /etc/backstage/ai-skills
  #   # Optional inline skills, defined directly in app-config.
  #   inline:
  #     - name: my-topic
  #       content: |
  #         # My topic
  #         Expert knowledge about my topic...

  # Optional: override the context window size (in tokens) used to render
  # the context usage bar. When set, applies regardless of the model name.
  # When unset, a built-in lookup by model name prefix is used.
  # contextWindow: 128000

  # Optional: override the built-in system prompt. MCP-specific additions
  # (e.g. muster prompt, failed-server notes) are still appended.
  # Inline:
  #   systemPrompt: |
  #     You are a helpful assistant...
  # Or load from a file:
  #   systemPrompt:
  #     $file: ./my-system-prompt.md

  # Optional: customize the welcome screen shown before the first message.
  # Any key omitted falls back to the built-in default. Up to 3 suggestions
  # are picked at random per mount. An empty `suggestions` array hides the
  # suggestion cards entirely.
  # welcome:
  #   title: 'How can I help you today?'
  #   subtitle: 'Not sure what to do here? Try one of these questions.'
  #   suggestions:
  #     - 'What applications are available for deployment?'
  #     - 'Who are my team mates?'

  # Optional: MCP servers configuration
  # mcp:
  #   # In-process Backstage MCP server: forward the chat caller's user
  #   # token so MCP actions run as the logged-in user (works with
  #   # `auth.who-am-i` and any other user-context tools).
  #   - name: backstage-actions
  #     url: http://localhost:7007/api/mcp-actions/v1
  #     useBackstageUserToken: true
  #   # External MCP server with a static bearer token:
  #   # - name: external-mcp
  #   #   url: https://external.example.com/mcp
  #   #   headers:
  #   #     Authorization: 'Bearer ${MCP_TOKEN}'
  #   # Muster MCP aggregator. The entry named `muster` is also used by the
  #   # muster plugin (workflow visualization) -- see
  #   # plugins/muster-backend/README.md.
  #   # - name: muster
  #   #   url: http://localhost:8091/mcp
