# Repo-specific CircleCI jobs. The dynamic-config setup workflow in
# .circleci/config.yml deep-merges this file into the generated
# .circleci/workflows.yml at pipeline runtime (yq `*+`: maps merge, job lists
# append). devctl never touches this file.
#
# Generated job names available to reference in `requires`: node-build (the
# install/verify/build job that persists packages/*/dist/*), push-to-registries
# (branch), push-to-registries-release, sync-china-registry, build-chart,
# execute-chart-tests, execute-chart-tests-release, push-chart-release (the
# operations-platform catalog push).
#
# What this file carries beyond the golden pipeline:
#   - push-to-control-plane-app-catalog: backstage ships the single `backstage`
#     chart to TWO catalogs. The generated push-chart-release publishes to the
#     operations-platform catalog (gen.ci.appCatalog); this carries the second
#     control-plane catalog push.
#
# The Node build (install/verify/build -> packages/*/dist/*) is now the
# generated `node-build` job (gen.ci.node), which the image jobs require for the
# workspace handoff; the hand-written `buildjob` it replaced lived here before.
version: 2.1

jobs:
  # Override just the resource_class of the generated `node-build` job. The
  # dynamic-config deep-merge (yq `*+`) merges this map into the generated
  # jobs.node-build; scalars from custom.yml win, so `docker`/`steps` stay as
  # generated and only the executor size changes. Bumped from large (4 vCPU /
  # 8 GB) to xlarge (8 vCPU / 16 GB) to speed up install/verify/build.
  #
  # The appended `steps` entry (lists append in the yq `*+` merge, so this
  # runs after the generated steps) persists the resolved @giantswarm/pro
  # archive from the yarn cache into the workspace. giantswarm/pro is a
  # PRIVATE repo consumed as a git dependency (github:giantswarm/pro#vX.Y.Z)
  # by plugins/roadmap-backend; the Docker image build runs
  # `yarn workspaces focus --all --production` without git credentials, so it
  # can only resolve the dependency offline from .yarn/cache. The image jobs
  # attach this workspace into the build context and the Dockerfile's
  # `COPY .yarn ./.yarn` picks the archive up. Interim measure until
  # @giantswarm/pro is published to npm (blocked on NPM_TOKEN provisioning,
  # same as PR #1799).
  node-build:
    resource_class: xlarge
    steps:
    - persist_to_workspace:
        root: .
        paths:
        - .yarn/cache/@giantswarm-pro-*

workflows:
  build:
    jobs:
    # Second catalog: the single `backstage` chart also ships to the
    # control-plane catalog. Gated on the same jobs as the generated
    # push-chart-release (operations-platform) so the same tested archive and
    # released image are published to both.
    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: push-to-control-plane-app-catalog
        app_catalog: control-plane-catalog
        app_catalog_test: control-plane-test-catalog
        chart: backstage
        requires:
        - execute-chart-tests-release
        - push-to-registries-release
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/
