app:
  title: BWI Demo
  baseUrl: https://localhost:3000
  branding:
    assetsPath: /Users/dmitry/work/giantswarm/backstage/branding-assets
    logo:
      height: 22
  https:
    $include: certificate.yaml
  extensions:
    - page:home: false
    - page:catalog: false
    - page:search: false
    - page:techdocs: false
    - page:scaffolder: false
    - page:api-docs: false
    - sub-page:user-settings/auth-providers: false
    - sub-page:user-settings/general:
        config:
          showIdentityCard: false
    - plugin:grafana: false
    - page:ai-chat
    - app/routes:
        config:
          redirects:
            - from: /
              to: /ai-chat

backend:
  baseUrl: https://localhost:7007
  listen:
    port: 7007
    host: 0.0.0.0
  cors:
    origin: https://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  https:
    $include: certificate.yaml
  csp:
    connect-src: ["'self'", 'http:', 'https:']
    img-src:
      - "'self'"
      - 'data:'
    script-src:
      - "'self'"
      - "'unsafe-eval'"
    worker-src:
      - "'self'"
      - "'unsafe-eval'"
      - 'blob:'
  database:
    client: better-sqlite3
    connection: ':memory:'
  cache:
    store: memory

permission:
  enabled: true

techdocs:
  builder: 'local'
  generator:
    runIn: 'local'
  publisher:
    type: 'local'

kubernetes:
  serviceLocatorMethod:
    type: 'multiTenant'
  clusterLocatorMethods:
    - type: 'config'
      clusters: []

auth:
  backstageTokenExpiration:
    minutes: 10
  environment: development
  providers:
    guest:
      userEntityRef: user:default/guest
      dangerouslyAllowOutsideDevelopment: true
    mcp-muster:
      development:
        clientId: https://backstage.graveler.gaws2.gigantic.io/api/auth/mcp-muster/.well-known/oauth-client.json
        authorizationUrl: https://muster.gazelle.awsprod.gigantic.io/oauth/authorize
        tokenUrl: https://muster.gazelle.awsprod.gigantic.io/oauth/token
        extraRedirectUris:
          - https://localhost:7007/api/auth/mcp-muster/handler/frame

grafana:
  domain: https://not-configured.local

